              - textbox "Direccion legal" [ref=e398]: Santo Domingo, Republica Dominicana
            - generic [ref=e399]:
              - generic [ref=e400]: RNC / ID fiscal
              - textbox "RNC / ID fiscal" [ref=e401]: Completar antes del lanzamiento comercial
            - generic [ref=e402]:
              - generic [ref=e403]: Intro legal
              - textbox "Intro legal" [ref=e404]: Este sitio funciona como catalogo digital y canal de contacto para Pulpiña RD. No procesa pagos ni tarjetas dentro de la app publica.
            - generic [ref=e406]:
              - button "Quitar" [ref=e408]
              - generic [ref=e409]:
                - generic [ref=e410]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e411]: 1. Identidad del responsable
              - generic [ref=e412]:
                - generic [ref=e413]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e414]: "Marca comercial: Pulpiña RD. Canales publicados: hola@pulpina.do, Instagram @pulpina.rd y atencion desde Santo Domingo, Republica Dominicana. Antes del lanzamiento comercial debes completar razon social, RNC, domicilio legal y telefono empresarial oficial."
            - generic [ref=e416]:
              - button "Quitar" [ref=e418]
              - generic [ref=e419]:
                - generic [ref=e420]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e421]: 2. Alcance del sitio
              - generic [ref=e422]:
                - generic [ref=e423]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e424]: El sitio funciona como catalogo digital, formulario de contacto, newsletter y generador de pedidos manuales. La web no procesa pagos ni tarjetas dentro de la app publica. Las imagenes, precios y disponibilidad son referenciales hasta la confirmacion final por mensaje.
            - generic [ref=e426]:
              - button "Quitar" [ref=e428]
              - generic [ref=e429]:
                - generic [ref=e430]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e431]: 3. Datos que recopilamos
              - generic [ref=e432]:
                - generic [ref=e433]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e434]: Podemos recopilar nombre, correo, telefono, mensaje y datos de pedido que compartas voluntariamente. Tambien podemos registrar IP, navegador, fechas, resultados anti-bot y registros de acceso administrativo cuando sea necesario para seguridad y operacion.
            - generic [ref=e436]:
              - button "Quitar" [ref=e438]
              - generic [ref=e439]:
                - generic [ref=e440]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e441]: 4. Finalidades del tratamiento
              - generic [ref=e442]:
                - generic [ref=e443]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e444]: Usamos los datos para responder consultas, generar numeros de orden, coordinar disponibilidad, preparar cotizaciones, atender soporte, prevenir abuso tecnico y proteger la integridad del sitio. Si te suscribes al newsletter, usaremos tu correo para enviarte novedades y promociones hasta que te des de baja.
            - generic [ref=e446]:
              - button "Quitar" [ref=e448]
              - generic [ref=e449]:
                - generic [ref=e450]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e451]: 5. Seguridad, cookies y proveedores
              - generic [ref=e452]:
                - generic [ref=e453]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e454]: Este sitio usa Cloudflare para hosting, seguridad y funciones de infraestructura. Los formularios publicos usan Cloudflare Turnstile para reducir abuso automatizado. El carrito usa almacenamiento local del navegador. Si lo desactivas, algunas funciones pueden dejar de operar correctamente.
            - generic [ref=e456]:
              - button "Quitar" [ref=e458]
              - generic [ref=e459]:
                - generic [ref=e460]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e461]: 6. Marketing y newsletter
              - generic [ref=e462]:
                - generic [ref=e463]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e464]: Solo debes suscribirte con un correo propio y valido. Puedes pedir la baja escribiendo a hola@pulpina.do o usando el mecanismo disponible en el mensaje recibido. No venderemos tu lista de contactos como base de datos independiente.
            - generic [ref=e466]:
              - button "Quitar" [ref=e468]
              - generic [ref=e469]:
                - generic [ref=e470]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e471]: 7. Transparencia comercial
              - generic [ref=e472]:
                - generic [ref=e473]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e474]: El numero de orden sirve como referencia operativa y no garantiza reserva automatica de inventario ni aceptacion irrevocable de una venta. Antes de cerrar una compra debemos confirmar disponibilidad, variante, envio, impuestos aplicables, plazo de entrega y precio total. No usamos cargos automaticos ni aceptacion por inaccion.
            - generic [ref=e476]:
              - button "Quitar" [ref=e478]
              - generic [ref=e479]:
                - generic [ref=e480]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e481]: 8. Menores de edad y contenido adulto
              - generic [ref=e482]:
                - generic [ref=e483]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e484]: Algunas categorias del catalogo estan dirigidas solo a personas adultas. No comercializamos ni promovemos productos de contenido adulto a menores de edad. Si detectas un uso indebido por un menor, puedes escribirnos para solicitar revision razonable.
            - generic [ref=e486]:
              - button "Quitar" [ref=e488]
              - generic [ref=e489]:
                - generic [ref=e490]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e491]: 9. Tus derechos y contacto legal
              - generic [ref=e492]:
                - generic [ref=e493]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e494]: Puedes escribirnos para solicitar acceso razonable a tus datos, correccion, actualizacion, baja de marketing o revision de un uso especifico de la informacion. Conservaremos datos solo durante el tiempo necesario para la finalidad original, soporte, auditoria, prevencion de fraude o cumplimiento legal. Si el cambio de politica es material, procuraremos notificarlo por un medio razonable dentro del sitio.
            - generic [ref=e496]:
              - button "Quitar" [ref=e498]
              - generic [ref=e499]:
                - generic [ref=e500]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e501]: 10. Ley aplicable y reclamaciones
              - generic [ref=e502]:
                - generic [ref=e503]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e504]: Estas politicas se interpretan conforme a las leyes aplicables de la Republica Dominicana. Si tienes una reclamacion, primero te pedimos contactarnos para intentar una solucion directa y razonable. Sin perjuicio de otros derechos legales, tambien puedes acudir a las autoridades competentes de proteccion al consumidor.