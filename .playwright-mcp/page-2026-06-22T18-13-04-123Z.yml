            - generic [ref=e219]:
              - generic [ref=e220]: Intro legal
              - textbox "Intro legal" [ref=e221]: Este sitio funciona como catalogo digital y canal de contacto para Pulpiña RD. No procesa pagos ni tarjetas dentro de la app publica.
            - generic [ref=e223]:
              - button "Quitar" [ref=e225]
              - generic [ref=e226]:
                - generic [ref=e227]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e228]: 1. Identidad del responsable
              - generic [ref=e229]:
                - generic [ref=e230]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e231]: "Marca comercial: Pulpiña RD. Canales publicados: hola@pulpina.do, Instagram @pulpina.rd y atencion desde Santo Domingo, Republica Dominicana. Antes del lanzamiento comercial debes completar razon social, RNC, domicilio legal y telefono empresarial oficial."
            - generic [ref=e233]:
              - button "Quitar" [ref=e235]
              - generic [ref=e236]:
                - generic [ref=e237]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e238]: 2. Alcance del sitio
              - generic [ref=e239]:
                - generic [ref=e240]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e241]: El sitio funciona como catalogo digital, formulario de contacto, newsletter y generador de pedidos manuales. La web no procesa pagos ni tarjetas dentro de la app publica. Las imagenes, precios y disponibilidad son referenciales hasta la confirmacion final por mensaje.
            - generic [ref=e243]:
              - button "Quitar" [ref=e245]
              - generic [ref=e246]:
                - generic [ref=e247]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e248]: 3. Datos que recopilamos
              - generic [ref=e249]:
                - generic [ref=e250]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e251]: Podemos recopilar nombre, correo, telefono, mensaje y datos de pedido que compartas voluntariamente. Tambien podemos registrar IP, navegador, fechas, resultados anti-bot y registros de acceso administrativo cuando sea necesario para seguridad y operacion.
            - generic [ref=e253]:
              - button "Quitar" [ref=e255]
              - generic [ref=e256]:
                - generic [ref=e257]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e258]: 4. Finalidades del tratamiento
              - generic [ref=e259]:
                - generic [ref=e260]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e261]: Usamos los datos para responder consultas, generar numeros de orden, coordinar disponibilidad, preparar cotizaciones, atender soporte, prevenir abuso tecnico y proteger la integridad del sitio. Si te suscribes al newsletter, usaremos tu correo para enviarte novedades y promociones hasta que te des de baja.
            - generic [ref=e263]:
              - button "Quitar" [ref=e265]
              - generic [ref=e266]:
                - generic [ref=e267]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e268]: 5. Seguridad, cookies y proveedores
              - generic [ref=e269]:
                - generic [ref=e270]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e271]: Este sitio usa Cloudflare para hosting, seguridad y funciones de infraestructura. Los formularios publicos usan Cloudflare Turnstile para reducir abuso automatizado. El carrito usa almacenamiento local del navegador. Si lo desactivas, algunas funciones pueden dejar de operar correctamente.
            - generic [ref=e273]:
              - button "Quitar" [ref=e275]
              - generic [ref=e276]:
                - generic [ref=e277]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e278]: 6. Marketing y newsletter
              - generic [ref=e279]:
                - generic [ref=e280]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e281]: Solo debes suscribirte con un correo propio y valido. Puedes pedir la baja escribiendo a hola@pulpina.do o usando el mecanismo disponible en el mensaje recibido. No venderemos tu lista de contactos como base de datos independiente.
            - generic [ref=e283]:
              - button "Quitar" [ref=e285]
              - generic [ref=e286]:
                - generic [ref=e287]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e288]: 7. Transparencia comercial
              - generic [ref=e289]:
                - generic [ref=e290]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e291]: El numero de orden sirve como referencia operativa y no garantiza reserva automatica de inventario ni aceptacion irrevocable de una venta. Antes de cerrar una compra debemos confirmar disponibilidad, variante, envio, impuestos aplicables, plazo de entrega y precio total. No usamos cargos automaticos ni aceptacion por inaccion.
            - generic [ref=e293]:
              - button "Quitar" [ref=e295]
              - generic [ref=e296]:
                - generic [ref=e297]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e298]: 8. Menores de edad y contenido adulto
              - generic [ref=e299]:
                - generic [ref=e300]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e301]: Algunas categorias del catalogo estan dirigidas solo a personas adultas. No comercializamos ni promovemos productos de contenido adulto a menores de edad. Si detectas un uso indebido por un menor, puedes escribirnos para solicitar revision razonable.
            - generic [ref=e303]:
              - button "Quitar" [ref=e305]
              - generic [ref=e306]:
                - generic [ref=e307]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e308]: 9. Tus derechos y contacto legal
              - generic [ref=e309]:
                - generic [ref=e310]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e311]: Puedes escribirnos para solicitar acceso razonable a tus datos, correccion, actualizacion, baja de marketing o revision de un uso especifico de la informacion. Conservaremos datos solo durante el tiempo necesario para la finalidad original, soporte, auditoria, prevencion de fraude o cumplimiento legal. Si el cambio de politica es material, procuraremos notificarlo por un medio razonable dentro del sitio.
            - generic [ref=e313]:
              - button "Quitar" [ref=e315]
              - generic [ref=e316]:
                - generic [ref=e317]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e318]: 10. Ley aplicable y reclamaciones
              - generic [ref=e319]:
                - generic [ref=e320]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e321]: Estas politicas se interpretan conforme a las leyes aplicables de la Republica Dominicana. Si tienes una reclamacion, primero te pedimos contactarnos para intentar una solucion directa y razonable. Sin perjuicio de otros derechos legales, tambien puedes acudir a las autoridades competentes de proteccion al consumidor.