            - generic [ref=e267]:
              - generic [ref=e268]: Intro legal
              - textbox "Intro legal" [ref=e269]: Este sitio funciona como catalogo digital y canal de contacto para Pulpiña RD. No procesa pagos ni tarjetas dentro de la app publica.
            - generic [ref=e271]:
              - button "Quitar" [ref=e273]
              - generic [ref=e274]:
                - generic [ref=e275]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e276]: 1. Identidad del responsable
              - generic [ref=e277]:
                - generic [ref=e278]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e279]: "Marca comercial: Pulpiña RD. Canales publicados: hola@pulpina.do, Instagram @pulpina.rd y atencion desde Santo Domingo, Republica Dominicana. Antes del lanzamiento comercial debes completar razon social, RNC, domicilio legal y telefono empresarial oficial."
            - generic [ref=e281]:
              - button "Quitar" [ref=e283]
              - generic [ref=e284]:
                - generic [ref=e285]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e286]: 2. Alcance del sitio
              - generic [ref=e287]:
                - generic [ref=e288]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e289]: El sitio funciona como catalogo digital, formulario de contacto, newsletter y generador de pedidos manuales. La web no procesa pagos ni tarjetas dentro de la app publica. Las imagenes, precios y disponibilidad son referenciales hasta la confirmacion final por mensaje.
            - generic [ref=e291]:
              - button "Quitar" [ref=e293]
              - generic [ref=e294]:
                - generic [ref=e295]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e296]: 3. Datos que recopilamos
              - generic [ref=e297]:
                - generic [ref=e298]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e299]: Podemos recopilar nombre, correo, telefono, mensaje y datos de pedido que compartas voluntariamente. Tambien podemos registrar IP, navegador, fechas, resultados anti-bot y registros de acceso administrativo cuando sea necesario para seguridad y operacion.
            - generic [ref=e301]:
              - button "Quitar" [ref=e303]
              - generic [ref=e304]:
                - generic [ref=e305]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e306]: 4. Finalidades del tratamiento
              - generic [ref=e307]:
                - generic [ref=e308]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e309]: Usamos los datos para responder consultas, generar numeros de orden, coordinar disponibilidad, preparar cotizaciones, atender soporte, prevenir abuso tecnico y proteger la integridad del sitio. Si te suscribes al newsletter, usaremos tu correo para enviarte novedades y promociones hasta que te des de baja.
            - generic [ref=e311]:
              - button "Quitar" [ref=e313]
              - generic [ref=e314]:
                - generic [ref=e315]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e316]: 5. Seguridad, cookies y proveedores
              - generic [ref=e317]:
                - generic [ref=e318]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e319]: Este sitio usa Cloudflare para hosting, seguridad y funciones de infraestructura. Los formularios publicos usan Cloudflare Turnstile para reducir abuso automatizado. El carrito usa almacenamiento local del navegador. Si lo desactivas, algunas funciones pueden dejar de operar correctamente.
            - generic [ref=e321]:
              - button "Quitar" [ref=e323]
              - generic [ref=e324]:
                - generic [ref=e325]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e326]: 6. Marketing y newsletter
              - generic [ref=e327]:
                - generic [ref=e328]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e329]: Solo debes suscribirte con un correo propio y valido. Puedes pedir la baja escribiendo a hola@pulpina.do o usando el mecanismo disponible en el mensaje recibido. No venderemos tu lista de contactos como base de datos independiente.
            - generic [ref=e331]:
              - button "Quitar" [ref=e333]
              - generic [ref=e334]:
                - generic [ref=e335]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e336]: 7. Transparencia comercial
              - generic [ref=e337]:
                - generic [ref=e338]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e339]: El numero de orden sirve como referencia operativa y no garantiza reserva automatica de inventario ni aceptacion irrevocable de una venta. Antes de cerrar una compra debemos confirmar disponibilidad, variante, envio, impuestos aplicables, plazo de entrega y precio total. No usamos cargos automaticos ni aceptacion por inaccion.
            - generic [ref=e341]:
              - button "Quitar" [ref=e343]
              - generic [ref=e344]:
                - generic [ref=e345]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e346]: 8. Menores de edad y contenido adulto
              - generic [ref=e347]:
                - generic [ref=e348]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e349]: Algunas categorias del catalogo estan dirigidas solo a personas adultas. No comercializamos ni promovemos productos de contenido adulto a menores de edad. Si detectas un uso indebido por un menor, puedes escribirnos para solicitar revision razonable.
            - generic [ref=e351]:
              - button "Quitar" [ref=e353]
              - generic [ref=e354]:
                - generic [ref=e355]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e356]: 9. Tus derechos y contacto legal
              - generic [ref=e357]:
                - generic [ref=e358]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e359]: Puedes escribirnos para solicitar acceso razonable a tus datos, correccion, actualizacion, baja de marketing o revision de un uso especifico de la informacion. Conservaremos datos solo durante el tiempo necesario para la finalidad original, soporte, auditoria, prevencion de fraude o cumplimiento legal. Si el cambio de politica es material, procuraremos notificarlo por un medio razonable dentro del sitio.
            - generic [ref=e361]:
              - button "Quitar" [ref=e363]
              - generic [ref=e364]:
                - generic [ref=e365]: Titulo del bloque
                - textbox "Titulo del bloque" [ref=e366]: 10. Ley aplicable y reclamaciones
              - generic [ref=e367]:
                - generic [ref=e368]: Contenido del bloque
                - textbox "Contenido del bloque" [ref=e369]: Estas politicas se interpretan conforme a las leyes aplicables de la Republica Dominicana. Si tienes una reclamacion, primero te pedimos contactarnos para intentar una solucion directa y razonable. Sin perjuicio de otros derechos legales, tambien puedes acudir a las autoridades competentes de proteccion al consumidor.